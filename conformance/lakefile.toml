name = "hex-bareiss-conformance"
defaultTargets = ["HexBareissConformance", "hexbareiss_emit_fixtures"]

[[require]]
name = "HexBareiss"
path = ".."

[[require]]
name = "hex-test-kit"
git = "https://github.com/leanprover/hex-test-kit.git"
rev = "610207eec0ca214928eec42a6dd2084d859bf94d"

[[lean_lib]]
name = "HexBareissConformance"
globs = ["HexBareiss.Conformance"]

[[lean_exe]]
name = "hexbareiss_emit_fixtures"
root = "HexBareiss.EmitFixtures"
